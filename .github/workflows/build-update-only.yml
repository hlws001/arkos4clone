name: 构建升级包

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build update.tar
        run: |
          chmod +x build_update_tar.sh
          sudo ./build_update_tar.sh

      - name: Build update.tar
        run: |
          chmod +x build_update_tar.sh
          sudo ./build_update_tar.sh -d

      - name: Prepare firstboot.sh
        run: |
          cp sh/clone.sh firstboot.sh

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)

          echo "上传文件: update*.tar firstboot.sh"
          gh release create "update-${BUILD_DATE}" \
            update-arkos.tar \
            update-darkos.tar \
            firstboot.sh \
            --title "ArkOS4Clone-Update-${BUILD_DATE}" \
            --notes "ArkOS4Clone OTA 更新包 - $BUILD_DATE" \
            --draft=true