name: dArkOS4Clone的构建和发布(Preview)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            parted \
            rsync \
            xz-utils \
            wget \
            unzip \
            golang-go \
            exfat-fuse \
            exfatprogs \
            e2fsprogs \
            dosfstools \
            btrfs-progs \
            f2fs-tools \
            p7zip-full

      - name: Download & extract source image
        run: |
          echo "=== 获取 dArkOS 最新 Release 信息 ==="
          RELEASE_JSON=$(curl -s https://api.github.com/repos/christianhaitian/dArkOS/releases/latest)
          TAG_NAME=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "最新 Release tag: $TAG_NAME"

          echo "=== 查找 G350 相关资源 ==="
          ASSETS=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = [a['browser_download_url'] for a in data.get('assets', []) if 'G350' in a['name']]
          assets.sort()
          for a in assets:
              print(a)
          ")
          echo "$ASSETS"

          if [ -z "$ASSETS" ]; then
            echo "ERROR: 未找到包含 G350 的资源"
            exit 1
          fi

          echo "=== 下载分卷 ==="
          for url in $ASSETS; do
            echo "Downloading $(basename "$url") ..."
            wget --progress=bar:force:noscroll "$url" || { echo "Failed to download $url"; exit 1; }
          done

          FIRST_PART=$(ls dArkOS_G350*.7z.001 2>/dev/null | head -1)
          if [ -z "$FIRST_PART" ]; then
            echo "ERROR: No .7z.001 file found"
            exit 1
          fi

          echo "=== 解压 7z 分卷 ==="
          7z x "$FIRST_PART" -o. -y

          echo "=== 删除中间文件，释放空间 ==="
          rm -f *.7z.001 *.7z.002 *.7z.003

          echo "=== 确认 img ==="
          IMG_FILE=$(ls *.img 2>/dev/null | head -1)
          if [ -z "$IMG_FILE" ]; then
            echo "ERROR: No .img file found"
            exit 1
          fi
          echo "Source image: $IMG_FILE ($(du -h "$IMG_FILE" | cut -f1))"

      - name: Build image
        run: |
          chmod +x build_image.sh grow_p2_plus.sh mount_arkos.sh clone_support.sh build_dtb_selector.sh uboot/flash_uboot.sh
          mkdir -p bin/pm_libs mnt
          sudo ./build_image.sh $(ls *.img) .

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          XZ_FILE=$(ls *.img.xz 2>/dev/null | head -1)
          if [ -z "$XZ_FILE" ]; then
            echo "ERROR: No .img.xz found"
            exit 1
          fi
          BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)
          FILE_SIZE=$(stat -c%s "$XZ_FILE")
          LIMIT=$((1900 * 1024 * 1024))

          if [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "文件超过1900M，7z分卷压缩..."
            7z a -v1900m -mx=0 "${XZ_FILE}.7z" "$XZ_FILE"
            FILES=$(ls ${XZ_FILE}.7z.* | tr '\n' ' ')
          else
            FILES="$XZ_FILE"
          fi

          echo "上传文件: $FILES"
          gh release create "$BUILD_DATE" \
            $FILES \
            --title "dArkOS4Clone-$BUILD_DATE" \
            --notes "dArkOS4Clone 构建版本 - $BUILD_DATE" \
            --draft=true
