name: ArkOS4Clone的构建和发布

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            parted \
            rsync \
            xz-utils \
            wget \
            unzip \
            golang-go \
            exfat-fuse \
            exfatprogs \
            e2fsprogs \
            dosfstools \
            btrfs-progs \
            f2fs-tools \
            p7zip-full

      - name: Download & extract source image
        run: |
          BASE_URL="https://github.com/lcdyk0517/baidupan2release/releases/download/backup-r3xs/ArkOS_R35S-R36S_v2.0_11072025_MultiPanel.img.xz.7z"
          FILENAME=$(basename "$BASE_URL")

          echo "=== 下载分卷 ==="
          for i in 001 002; do
            echo "Downloading part $i ..."
            wget --progress=bar:force:noscroll "${BASE_URL}.${i}" && echo "part $i done" || { echo "Failed to download part $i"; exit 1; }
          done

          echo "=== 解压 7z 分卷 ==="
          7z x "${FILENAME}.001" -o. -y

          echo "=== 查找并解压 xz ==="
          ls -lh *.7z* *.xz 2>/dev/null || true
          XZ_FILE=$(ls *.xz 2>/dev/null | head -1)
          if [ -z "$XZ_FILE" ]; then
            echo "ERROR: No .xz file found after 7z extraction"
            exit 1
          fi
          echo "Extracting $XZ_FILE ..."
          unxz "$XZ_FILE"

          echo "=== 删除中间文件，释放空间 ==="
          rm -f *.7z.001 *.7z.002

          echo "=== 确认 img ==="
          IMG_FILE=$(ls *.img 2>/dev/null | head -1)
          echo "Source image: $IMG_FILE ($(du -h "$IMG_FILE" | cut -f1))"

      - name: Build image
        run: |
          chmod +x build_image.sh grow_p2_plus.sh mount_arkos.sh clone_support.sh build_dtb_selector.sh uboot/flash_uboot.sh
          mkdir -p bin/pm_libs mnt
          sudo ./build_image.sh $(ls *.img) . --ci

      - name: Build ArkOS update.tar
        run: |
          chmod +x build_update_tar.sh
          sudo ./build_update_tar.sh

      - name: Prepare firstboot.sh
        run: |
          cp sh/clone.sh firstboot.sh

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          XZ_FILE=$(ls *.img.xz 2>/dev/null | head -1)
          if [ -z "$XZ_FILE" ]; then
            echo "ERROR: No .img.xz found"
            exit 1
          fi
          BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)
          FILE_SIZE=$(stat -c%s "$XZ_FILE")
          LIMIT=$((1900 * 1024 * 1024))

          if [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "文件超过1900M，7z分卷压缩..."
            7z a -v1900m -mx=0 "${XZ_FILE}.7z" "$XZ_FILE"
            FILES=$(ls ${XZ_FILE}.7z.* | tr '\n' ' ')
          else
            FILES="$XZ_FILE"
          fi

          echo "上传文件: $FILES update-arkos.tar firstboot.sh"
          gh release create "$BUILD_DATE" \
            $FILES \
            update-arkos.tar \
            firstboot.sh \
            --title "ArkOS4Clone-$BUILD_DATE" \
            --notes "ArkOS4Clone 构建版本 - $BUILD_DATE" \
            --draft=true
